name: iOS Build & Test

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]
  workflow_dispatch:

concurrency:
  group: ios-build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build & Test
    runs-on: macos-15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode 26.3
        run: sudo xcode-select -s /Applications/Xcode_26.3.app/Contents/Developer

      - name: Decrypt keys.plist
        run: |
          gpg --batch --yes --passphrase "$GPG_PASSPHRASE" \
            -o keys.plist -d keys.plist.gpg
        env:
          GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}

      - name: Show build environment
        run: |
          xcodebuild -version
          swift --version

      - name: Build
        run: |
          set -o pipefail
          xcodebuild build \
            -project "Info Malang Batu.xcodeproj" \
            -scheme "Info Malang Batu" \
            -destination "platform=iOS Simulator,name=iPhone 16,OS=18.6" \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            | xcpretty --color

      - name: Run Tests
        run: |
          set -o pipefail
          xcodebuild test \
            -project "Info Malang Batu.xcodeproj" \
            -scheme "Info Malang Batu" \
            -destination "platform=iOS Simulator,name=iPhone 16,OS=18.6" \
            -testPlan "Info Malang Batu" \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            | xcpretty --color

      - name: Upload Test Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: ~/Library/Developer/Xcode/DerivedData/**/Logs/Test/*.xcresult
          retention-days: 7